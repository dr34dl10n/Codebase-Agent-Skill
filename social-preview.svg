<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)" rx="0"/>
  <!-- Accent bar top -->
  <rect width="1280" height="6" fill="url(#accent)"/>
  <!-- Tree icon (simplified) -->
  <g transform="translate(170,180)">
    <circle cx="0" cy="60" r="80" fill="#1e3a5f" opacity="0.5"/>
    <circle cx="0" cy="40" r="55" fill="#2563eb" opacity="0.7"/>
    <circle cx="0" cy="30" r="35" fill="#7c3aed" opacity="0.8"/>
    <!-- Code brackets -->
    <text x="-22" y="40" font-family="monospace" font-size="48" fill="white" opacity="0.9">&lt;/&gt;</text>
  </g>
  <!-- Title -->
  <text x="640" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="white">
    Tree-sitter + pgvector
  </text>
  <!-- Slogan -->
  <text x="640" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="44" font-weight="400" fill="url(#accent)">
    = Agent qui pense vraiment
  </text>
  <!-- Subtitle -->
  <text x="640" y="380" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#8b949e">
    Semantic Code Search RAG Backbone for AI Agents
  </text>
  <!-- Badges -->
  <g transform="translate(640,440)">
    <rect x="-300" y="-16" width="140" height="32" rx="16" fill="#1e3a5f"/>
    <text x="-230" y="5" text-anchor="middle" font-family="monospace" font-size="16" fill="#58a6ff">MCP</text>
    <rect x="-145" y="-16" width="160" height="32" rx="16" fill="#1e3a5f"/>
    <text x="-65" y="5" text-anchor="middle" font-family="monospace" font-size="16" fill="#7c3aed">Tree-sitter</text>
    <rect x="30" y="-16" width="140" height="32" rx="16" fill="#1e3a5f"/>
    <text x="100" y="5" text-anchor="middle" font-family="monospace" font-size="16" fill="#f0883e">pgvector</text>
    <rect x="190" y="-16" width="110" height="32" rx="16" fill="#1e3a5f"/>
    <text x="245" y="5" text-anchor="middle" font-family="monospace" font-size="16" fill="#3fb950">Ollama</text>
  </g>
  <!-- Bottom accent bar -->
  <rect y="634" width="1280" height="6" fill="url(#accent)"/>
  <!-- Author -->
  <text x="640" y="540" text-anchor="middle" font-family="monospace" font-size="20" fill="#484f58">dr34dl10n/Codebase-Agent-Skill</text>
</svg>